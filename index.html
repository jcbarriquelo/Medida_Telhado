<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Medidas do Telhado</title>
  <style>
    :root {
      --bg: #f3f4f6;
      --panel: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #d1d5db;
      --green: #16a34a;
      --green-dark: #14532d;
      --danger: #b91c1c;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.14);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      overscroll-behavior: none;
    }

    body {
      padding-bottom: env(safe-area-inset-bottom);
    }

    header {
      background: var(--green-dark);
      color: white;
      padding: 14px 14px 12px;
      position: sticky;
      top: 0;
      z-index: 20;
      box-shadow: 0 2px 12px rgba(0,0,0,0.18);
    }

    header h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
    }

    header p {
      margin: 4px 0 0;
      font-size: 12px;
      opacity: 0.9;
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 10px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .toolbar,
    .canvas-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
    }

    .toolbar {
      padding: 10px;
      display: grid;
      gap: 10px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    input[type="file"] {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 16px;
      background: white;
    }

    .tools {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 13px 10px;
      cursor: pointer;
      font-weight: 700;
      font-size: 15px;
      background: #e5e7eb;
      color: var(--text);
      min-height: 48px;
    }

    button:active {
      transform: scale(0.985);
    }

    button.active {
      background: #dcfce7;
      color: var(--green-dark);
      outline: 3px solid rgba(22, 163, 74, 0.25);
    }

    button.primary {
      background: var(--green);
      color: white;
    }

    button.danger {
      background: var(--danger);
      color: white;
    }

    .status {
      font-size: 13px;
      padding: 10px;
      border-radius: 12px;
      background: #f0fdf4;
      color: #14532d;
      border: 1px solid #bbf7d0;
      line-height: 1.35;
    }

    .canvas-panel {
      padding: 8px;
    }

    .canvas-wrap {
      width: 100%;
      overflow: auto;
      background:
        linear-gradient(45deg, #f3f4f6 25%, transparent 25%),
        linear-gradient(-45deg, #f3f4f6 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #f3f4f6 75%),
        linear-gradient(-45deg, transparent 75%, #f3f4f6 75%);
      background-size: 24px 24px;
      background-position: 0 0, 0 12px, 12px -12px, -12px 0;
      border: 1px dashed #cbd5e1;
      border-radius: 12px;
      min-height: 52vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 8px;
      touch-action: none;
    }

    canvas {
      max-width: 100%;
      height: auto;
      background: white;
      border-radius: 8px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.18);
      cursor: crosshair;
      touch-action: none;
    }

    .empty-state {
      color: var(--muted);
      text-align: center;
      padding: 52px 16px;
      line-height: 1.45;
      font-size: 14px;
    }

    .list {
      max-height: 145px;
      overflow: auto;
      display: grid;
      gap: 6px;
    }

    .item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 8px;
      font-size: 13px;
      background: #fafafa;
    }

    .item small {
      color: var(--muted);
      display: block;
      margin-top: 2px;
      word-break: break-word;
    }

    .item button {
      min-height: 36px;
      padding: 7px 9px;
      font-size: 12px;
    }

    .desktop-title {
      display: none;
    }

    @media (min-width: 920px) {
      header {
        position: static;
        padding: 16px 20px;
      }

      header h1 {
        font-size: 21px;
      }

      header p {
        font-size: 13px;
      }

      main {
        grid-template-columns: 320px 1fr;
        align-items: start;
        padding: 16px;
      }

      .toolbar {
        position: sticky;
        top: 16px;
      }

      .canvas-panel {
        min-height: 74vh;
      }

      .canvas-wrap {
        min-height: 70vh;
      }

      .desktop-title {
        display: block;
        font-size: 12px;
        color: var(--muted);
        line-height: 1.35;
      }
    }

    @media (max-width: 520px) {
      main {
        padding: 8px;
      }

      .toolbar {
        padding: 8px;
        border-radius: 12px;
      }

      .canvas-panel {
        padding: 6px;
        border-radius: 12px;
      }

      .tools,
      .actions {
        gap: 6px;
      }

      button {
        font-size: 14px;
        padding: 12px 6px;
      }

      .canvas-wrap {
        min-height: 50vh;
        padding: 6px;
      }
    }

    @media print {
      header, .toolbar {
        display: none;
      }

      main {
        display: block;
        padding: 0;
      }

      .canvas-panel {
        box-shadow: none;
        border: 0;
        padding: 0;
      }

      .canvas-wrap {
        border: 0;
        padding: 0;
        overflow: visible;
      }

      canvas {
        box-shadow: none;
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Medidas do Telhado</h1>
    <p>Carregue a foto, marque as medidas e baixe a imagem anotada.</p>
  </header>

  <main>
    <section class="toolbar">
      <div>
        <label for="imageInput">Imagem do telhado</label>
        <input id="imageInput" type="file" accept="image/*" />
      </div>

      <div class="tools">
        <button id="toolMeasure" class="active">Medida</button>
        <button id="toolNote">Observação</button>
        <button id="toolMove">Mover</button>
      </div>

      <div class="actions">
        <button id="btnClear" class="danger">Limpar marcações</button>
        <button id="btnExport" class="primary">Baixar imagem marcada</button>
      </div>

      <div class="status" id="statusBox">Carregue uma imagem para começar.</div>

      <div class="list" id="annotationList"></div>
    </section>

    <section class="canvas-panel">
      <div class="canvas-wrap" id="canvasWrap">
        <div class="empty-state" id="emptyState">
          Nenhuma imagem carregada.<br>
          Use uma imagem aérea/ortogonal do telhado.
        </div>
        <canvas id="canvas" style="display:none"></canvas>
      </div>
    </section>
  </main>

  <script>
    const MARK_COLOR = '#16a34a';

    const imageInput = document.getElementById('imageInput');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const emptyState = document.getElementById('emptyState');
    const statusBox = document.getElementById('statusBox');
    const annotationList = document.getElementById('annotationList');

    const buttons = {
      measure: document.getElementById('toolMeasure'),
      note: document.getElementById('toolNote'),
      move: document.getElementById('toolMove')
    };

    let img = new Image();
    let imageName = 'telhado';
    let imageLoaded = false;
    let tool = 'measure';
    let annotations = [];
    let drawing = false;
    let startPoint = null;
    let previewPoint = null;
    let movingIndex = null;
    let lastPointer = null;

    function setStatus(message) {
      statusBox.textContent = message;
    }

    function setTool(nextTool) {
      tool = nextTool;

      Object.keys(buttons).forEach(key => {
        buttons[key].classList.toggle('active', key === nextTool);
      });

      const labels = {
        measure: 'Medida: arraste sobre a borda do telhado e informe o valor real.',
        note: 'Observação: toque no ponto da imagem e escreva a anotação.',
        move: 'Mover: arraste uma marcação existente para ajustar a posição.'
      };

      setStatus(labels[tool]);
      draw();
    }

    function getPoint(event) {
      const rect = canvas.getBoundingClientRect();

      return {
        x: (event.clientX - rect.left) * canvas.width / rect.width,
        y: (event.clientY - rect.top) * canvas.height / rect.height
      };
    }

    function distance(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function midPoint(a, b) {
      return { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 };
    }

    function drawArrow(from, to, color, width = 5) {
      const headLength = Math.max(14, Math.round(canvas.width * 0.012));
      const angle = Math.atan2(to.y - from.y, to.x - from.x);

      ctx.strokeStyle = color;
      ctx.fillStyle = color;
      ctx.lineWidth = width;
      ctx.lineCap = 'round';

      ctx.beginPath();
      ctx.moveTo(from.x, from.y);
      ctx.lineTo(to.x, to.y);
      ctx.stroke();

      drawArrowHead(to, angle, headLength, color);
      drawArrowHead(from, angle + Math.PI, headLength, color);
    }

    function drawArrowHead(point, angle, length, color) {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(point.x, point.y);
      ctx.lineTo(
        point.x - length * Math.cos(angle - Math.PI / 6),
        point.y - length * Math.sin(angle - Math.PI / 6)
      );
      ctx.lineTo(
        point.x - length * Math.cos(angle + Math.PI / 6),
        point.y - length * Math.sin(angle + Math.PI / 6)
      );
      ctx.closePath();
      ctx.fill();
    }

    function drawLabel(text, x, y, color) {
      if (!text) return;

      const fontSize = Math.max(18, Math.round(canvas.width * 0.018));
      ctx.font = `bold ${fontSize}px Arial`;
      ctx.textBaseline = 'middle';

      const paddingX = 10;
      const paddingY = 7;
      const metrics = ctx.measureText(text);
      const w = metrics.width + paddingX * 2;
      const h = fontSize + paddingY * 2;

      const bx = Math.min(Math.max(x - w / 2, 4), canvas.width - w - 4);
      const by = Math.min(Math.max(y - h / 2, 4), canvas.height - h - 4);

      ctx.fillStyle = 'rgba(255,255,255,0.94)';
      roundRect(ctx, bx, by, w, h, 8);
      ctx.fill();

      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      roundRect(ctx, bx, by, w, h, 8);
      ctx.stroke();

      ctx.fillStyle = '#111827';
      ctx.fillText(text, bx + paddingX, by + h / 2);
    }

    function roundRect(ctx, x, y, w, h, r) {
      const radius = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.arcTo(x + w, y, x + w, y + h, radius);
      ctx.arcTo(x + w, y + h, x, y + h, radius);
      ctx.arcTo(x, y + h, x, y, radius);
      ctx.arcTo(x, y, x + w, y, radius);
      ctx.closePath();
    }

    function drawNote(point, text, color) {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(point.x, point.y, 10, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = 'white';
      ctx.font = 'bold 15px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('i', point.x, point.y + 1);
      ctx.textAlign = 'left';

      drawLabel(text, point.x + 70, point.y - 22, color);
    }

    function draw() {
      if (!imageLoaded) return;

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      annotations.forEach(a => {
        if (a.type === 'measure') {
          drawArrow(a.start, a.end, MARK_COLOR);
          const mid = midPoint(a.start, a.end);
          drawLabel(a.label, mid.x, mid.y - 26, MARK_COLOR);
        }

        if (a.type === 'note') {
          drawNote(a.point, a.label, MARK_COLOR);
        }
      });

      if (drawing && startPoint && previewPoint && tool === 'measure') {
        drawArrow(startPoint, previewPoint, MARK_COLOR, 3);
      }
    }

    function renderList() {
      annotationList.innerHTML = '';

      annotations.forEach((a, index) => {
        const item = document.createElement('div');
        item.className = 'item';

        const info = document.createElement('div');
        const typeName = a.type === 'measure' ? 'Medida' : 'Observação';
        info.innerHTML = `<b>${index + 1}. ${typeName}</b><small>${escapeHtml(a.label || 'sem texto')}</small>`;

        const edit = document.createElement('button');
        edit.textContent = 'Editar';
        edit.onclick = () => {
          const novo = prompt('Editar texto:', a.label || '');

          if (novo !== null) {
            a.label = novo.trim();
            renderList();
            draw();
          }
        };

        item.appendChild(info);
        item.appendChild(edit);
        annotationList.appendChild(item);
      });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function askLabel(message) {
      const value = prompt(message, '');

      if (value === null) return null;

      return value.trim();
    }

    function formatMeasureLabel(value) {
      let text = String(value || '').trim();

      if (!text) return '';

      text = text.replace(/\s+/g, '');

      if (/m$/i.test(text)) {
        return text.replace(/m$/i, 'm');
      }

      return text + 'm';
    }

    function handlePointerDown(event) {
      if (!imageLoaded) return;

      event.preventDefault();

      const p = getPoint(event);
      canvas.setPointerCapture(event.pointerId);

      if (tool === 'measure') {
        drawing = true;
        startPoint = p;
        previewPoint = p;
      }

      if (tool === 'note') {
        const label = askLabel('Digite a observação:');

        if (label !== null && label !== '') {
          annotations.push({
            type: 'note',
            point: p,
            label
          });

          renderList();
          draw();
        }
      }

      if (tool === 'move') {
        movingIndex = findAnnotationAt(p);
        lastPointer = p;
      }
    }

    function handlePointerMove(event) {
      if (!imageLoaded) return;

      const p = getPoint(event);

      if (drawing && tool === 'measure') {
        previewPoint = p;
        draw();
      }

      if (tool === 'move' && movingIndex !== null && lastPointer) {
        const dx = p.x - lastPointer.x;
        const dy = p.y - lastPointer.y;

        moveAnnotation(annotations[movingIndex], dx, dy);

        lastPointer = p;
        draw();
      }
    }

    function handlePointerUp(event) {
      if (!imageLoaded) return;

      if (tool === 'measure' && drawing) {
        const endPoint = getPoint(event);
        drawing = false;

        if (distance(startPoint, endPoint) > 12) {
          const label = askLabel('Informe a medida real:');

          if (label !== null && label !== '') {
            const formattedLabel = formatMeasureLabel(label);

            annotations.push({
              type: 'measure',
              start: startPoint,
              end: endPoint,
              label: formattedLabel
            });

            renderList();
          }
        }

        startPoint = null;
        previewPoint = null;
        draw();
      }

      if (tool === 'move') {
        movingIndex = null;
        lastPointer = null;
      }
    }

    function findAnnotationAt(point) {
      for (let i = annotations.length - 1; i >= 0; i--) {
        const a = annotations[i];

        if (a.type === 'note' && distance(a.point, point) < 45) {
          return i;
        }

        if (a.type === 'measure') {
          const d = distancePointToSegment(point, a.start, a.end);

          if (d < 28) {
            return i;
          }
        }
      }

      return null;
    }

    function distancePointToSegment(p, a, b) {
      const l2 = Math.pow(distance(a, b), 2);

      if (l2 === 0) return distance(p, a);

      let t = ((p.x - a.x) * (b.x - a.x) + (p.y - a.y) * (b.y - a.y)) / l2;
      t = Math.max(0, Math.min(1, t));

      const projection = {
        x: a.x + t * (b.x - a.x),
        y: a.y + t * (b.y - a.y)
      };

      return distance(p, projection);
    }

    function moveAnnotation(a, dx, dy) {
      if (a.type === 'measure') {
        a.start.x += dx;
        a.start.y += dy;
        a.end.x += dx;
        a.end.y += dy;
      }

      if (a.type === 'note') {
        a.point.x += dx;
        a.point.y += dy;
      }
    }

    function exportImage() {
      if (!imageLoaded) {
        alert('Carregue uma imagem antes de exportar.');
        return;
      }

      draw();

      const link = document.createElement('a');
      const baseName = imageName.replace(/\.[^/.]+$/, '');
      link.download = `${baseName}-medidas-telhado.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    imageInput.addEventListener('change', event => {
      const file = event.target.files[0];

      if (!file) return;

      imageName = file.name;

      const reader = new FileReader();

      reader.onload = () => {
        img = new Image();

        img.onload = () => {
          const maxCanvasSide = 2200;
          let w = img.naturalWidth;
          let h = img.naturalHeight;

          if (Math.max(w, h) > maxCanvasSide) {
            const scale = maxCanvasSide / Math.max(w, h);
            w = Math.round(w * scale);
            h = Math.round(h * scale);
          }

          canvas.width = w;
          canvas.height = h;

          imageLoaded = true;
          annotations = [];
          emptyState.style.display = 'none';
          canvas.style.display = 'block';

          renderList();
          setTool('measure');
          setStatus('Imagem carregada. Arraste sobre uma borda para inserir uma medida.');
          draw();
        };

        img.src = reader.result;
      };

      reader.readAsDataURL(file);
    });

    canvas.addEventListener('pointerdown', handlePointerDown);
    canvas.addEventListener('pointermove', handlePointerMove);
    canvas.addEventListener('pointerup', handlePointerUp);
    canvas.addEventListener('pointercancel', handlePointerUp);

    buttons.measure.addEventListener('click', () => setTool('measure'));
    buttons.note.addEventListener('click', () => setTool('note'));
    buttons.move.addEventListener('click', () => setTool('move'));

    document.getElementById('btnClear').addEventListener('click', () => {
      if (!imageLoaded) return;

      if (confirm('Deseja remover todas as marcações?')) {
        annotations = [];
        renderList();
        draw();
        setStatus('Marcações removidas.');
      }
    });

    document.getElementById('btnExport').addEventListener('click', exportImage);

    renderList();
  </script>
</body>
</html>
